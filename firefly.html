<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蛍観測マップ | 富良野高校科学部</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7f4;
      color: #222;
    }
    header {
      background: #2c5f3c;
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 { margin: 0 0 0.5rem; font-size: 1.4rem; }
    nav a {
      color: white;
      margin: 0 0.8rem;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    nav a:hover { opacity: 1; text-decoration: underline; }
    #map {
      width: 100%;
      height: 80vh;
    }
    .map-intro {
      max-width: 900px;
      margin: 1.2rem auto;
      padding: 0 1rem;
      font-size: 0.92rem;
      color: #444;
    }
    .popup-pin-button {
      background: #2c5f3c;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 0.4rem;
    }
    .popup-pin-button:hover { background: #244e32; }
    .submit-section {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .submit-section h2 {
      margin-top: 0;
      font-size: 1.2rem;
      border-left: 4px solid #2c5f3c;
      padding-left: 0.6rem;
    }
    .submit-section label {
      display: block;
      margin-top: 1rem;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .submit-section input,
    .submit-section textarea {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .submit-section textarea { resize: vertical; min-height: 80px; }
    .submit-section button[type="submit"] {
      margin-top: 1.2rem;
      background: #2c5f3c;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .submit-section button[type="submit"]:hover { background: #244e32; }
    .submit-note {
      font-size: 0.82rem;
      color: #666;
      margin-top: 0.8rem;
    }
    #submit-status {
      margin-top: 1rem;
      font-size: 0.9rem;
      padding: 0.6rem;
      border-radius: 6px;
      display: none;
    }
    #submit-status.success { background: #e6f4ea; color: #246a3d; display: block; }
    #submit-status.error { background: #fdecea; color: #a33a2e; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>蛍観測マップ</h1>
    <nav>
      <a href="/">ホーム</a>
      <a href="/about.html">活動紹介</a>
      <a href="/firefly.html">蛍マップ</a>
    </nav>
  </header>

  <div class="map-intro">
    <p>富良野地区(富良野市・上富良野町・中富良野町・南富良野町など)で観測された蛍の情報を地図に表示しています。地図をクリックして観測場所を指定してください。</p>
  </div>

  <div id="map"></div>

  <div class="submit-section" id="submit-section">
    <h2>蛍を見つけたら教えてください</h2>
    <form id="sighting-form">
      <label for="lat">緯度(地図をクリックすると自動入力されます)</label>
      <input type="text" id="lat" readonly required>

      <label for="lng">経度</label>
      <input type="text" id="lng" readonly required>

      <label for="date">観測日(覚えている範囲で構いません)</label>
      <input type="text" id="date" placeholder="例: 2020年7月頃" required>

      <label for="note">メモ(任意・300文字以内)</label>
      <textarea id="note" maxlength="300" placeholder="例: 川沿いの草むらで5匹ほど確認しました"></textarea>

      <button type="submit">送信する</button>
      <p class="submit-note">※ 送信内容は部活担当者の確認後に地図へ反映されます。</p>
    </form>
    <div id="submit-status"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 富良野地区の中心あたりの座標
    const map = L.map('map').setView([43.3417, 142.3833], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // 蛍っぽいアイコン
    const fireflyIcon = L.icon({
      iconUrl: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-icon.png',
      shadowUrl: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    });

    // JSONファイルから観測データを読み込んでピンを立てる
    fetch('/firefly-sightings.json')
      .then(res => res.json())
      .then(sightings => {
        sightings.forEach(s => {
          L.marker([s.lat, s.lng], { icon: fireflyIcon })
            .addTo(map)
            .bindPopup(`<strong>観測日: ${s.date}</strong><br>${s.note}`);
        });
      })
      .catch(err => {
        console.error('観測データの読み込みに失敗しました', err);
      });

    // 地図をクリックすると緯度経度をフォームに自動入力し、ポップアップにボタンを表示
    let tempMarker = null;

    // グローバルに置いて、ポップアップ内のボタンから呼べるようにする
    window.scrollToForm = function () {
      document.getElementById('submit-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    map.on('click', function (e) {
      document.getElementById('lat').value = e.latlng.lat.toFixed(6);
      document.getElementById('lng').value = e.latlng.lng.toFixed(6);

      if (tempMarker) map.removeLayer(tempMarker);
      tempMarker = L.marker(e.latlng).addTo(map)
        .bindPopup('<div>この場所でよろしいですか?<br><button class="popup-pin-button" onclick="scrollToForm()">ここです!</button></div>')
        .openPopup();
    });

    // フォーム送信処理
    document.getElementById('sighting-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const lat = parseFloat(document.getElementById('lat').value);
      const lng = parseFloat(document.getElementById('lng').value);
      const date = document.getElementById('date').value;
      const note = document.getElementById('note').value;

      const statusBox = document.getElementById('submit-status');

      if (isNaN(lat) || isNaN(lng)) {
        statusBox.className = 'error';
        statusBox.textContent = '地図をクリックして場所を指定してください。';
        return;
      }

      try {
        const res = await fetch('/api/sightings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lat, lng, date, note })
        });

        const result = await res.json();

        if (res.ok) {
          statusBox.className = 'success';
          statusBox.textContent = '送信しました!確認後、地図に反映されます。ご協力ありがとうございます。';
          document.getElementById('sighting-form').reset();
          if (tempMarker) { map.removeLayer(tempMarker); tempMarker = null; }
        } else {
          statusBox.className = 'error';
          statusBox.textContent = result.error || '送信に失敗しました。';
        }
      } catch (err) {
        statusBox.className = 'error';
        statusBox.textContent = '通信エラーが発生しました。';
      }
    });
  </script>
</body>
</html>
