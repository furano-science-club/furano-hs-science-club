<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蛍観測マップ | 富良野高校科学部</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7f4;
      color: #222;
    }
    header {
      background: #2c5f3c;
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 { margin: 0 0 0.5rem; font-size: 1.4rem; }
    nav a {
      color: white;
      margin: 0 0.8rem;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    nav a:hover { opacity: 1; text-decoration: underline; }
    #map {
      width: 100%;
      height: 80vh;
    }
    .map-intro {
      max-width: 900px;
      margin: 1.2rem auto;
      padding: 0 1rem;
      font-size: 0.92rem;
      color: #444;
    }
  </style>
</head>
<body>
  <header>
    <h1>蛍観測マップ</h1>
    <nav>
      <a href="/">ホーム</a>
      <a href="/about.html">活動紹介</a>
      <a href="/firefly.html">蛍マップ</a>
    </nav>
  </header>

  <div class="map-intro">
    <p>富良野地区(富良野市・上富良野町・中富良野町・南富良野町など)で観測された蛍の情報を地図に表示しています。</p>
  </div>

  <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 富良野地区の中心あたりの座標
    const map = L.map('map').setView([43.3417, 142.3833], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // 仮の観測データ(テスト用)
    const sightings = [
      {
        lat: 43.3553,
        lng: 142.4781,
        date: "2026-06-15",
        note: "河川沿いの草地で複数匹確認"
      },
      {
        lat: 43.4500,
        lng: 142.4600,
        date: "2026-06-18",
        note: "水田の近くで観測"
      },
      {
        lat: 43.2200,
        lng: 142.3700,
        date: "2026-06-20",
        note: "森林に隣接した湿地で確認"
      }
    ];

    // 蛍っぽい黄緑のアイコンを作る
    const fireflyIcon = L.icon({
      iconUrl: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-icon.png',
      shadowUrl: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41]
    });

    sightings.forEach(s => {
      L.marker([s.lat, s.lng], { icon: fireflyIcon })
        .addTo(map)
        .bindPopup(`<strong>観測日: ${s.date}</strong><br>${s.note}`);
    });
  </script>
